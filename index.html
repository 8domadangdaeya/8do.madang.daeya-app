<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팔도마당 대야점</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
    }
    .header {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand-image {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #64748b;
      font-size: 12px;
      text-align: center;
    }
    .brand-image img { width: 100%; height: 100%; object-fit: cover; }
    h1, h2, h3, p { margin: 0; }
    .sub { margin-top: 8px; color: #475569; font-size: 14px; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; }
    .badge {
      background: #e2e8f0;
      color: #334155;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }
    .button {
      border: 1px solid #cbd5e1;
      background: white;
      color: #0f172a;
      border-radius: 16px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .button.primary {
      background: #0f172a;
      color: white;
      border-color: #0f172a;
    }
    .button.secondary {
      background: #f8fafc;
    }
    .button.full { width: 100%; }
    .menu {
      position: absolute;
      right: 0;
      top: 48px;
      width: 220px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      padding: 8px;
      display: none;
      z-index: 20;
    }
    .menu.open { display: block; }
    .menu button {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border: 0;
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .menu button.active { background: #0f172a; color: white; }
    .hero {
      margin-top: 24px;
      background: linear-gradient(90deg, #0f172a 0%, #334155 100%);
      color: white;
      border-radius: 24px;
      padding: 28px;
    }
    .hero p { margin-top: 8px; color: #cbd5e1; font-size: 14px; }
    .hero-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .hero-buttons .button { background: white; }
    .admin-stats {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .stat { padding: 20px; }
    .stat-title { color: #64748b; font-size: 14px; }
    .stat-value { font-size: 32px; font-weight: 700; margin-top: 6px; }
    .section-title { margin: 24px 0 8px; font-size: 28px; font-weight: 800; }
    .section-sub { color: #64748b; font-size: 14px; }
    .product-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .product-card { overflow: hidden; }
    .product-image { width: 100%; aspect-ratio: 4 / 3; background: #e2e8f0; object-fit: cover; }
    .product-body { padding: 18px; }
    .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .price { margin-top: 8px; font-size: 20px; font-weight: 700; }
    .small-badges { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }
    .outline-badge {
      border: 1px solid #cbd5e1;
      color: #334155;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .dark-badge {
      background: #0f172a;
      color: white;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .desc { color: #475569; font-size: 14px; line-height: 1.5; }
    .pickup { margin-top: 6px; color: #334155; font-size: 14px; font-weight: 600; }
    .stock-box {
      margin: 16px 0;
      border-radius: 16px;
      background: #f8fafc;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }
    .soldout {
      border: 1px solid #fecaca;
      background: #fef2f2;
      border-radius: 16px;
      padding: 14px;
      color: #b91c1c;
      font-size: 14px;
      line-height: 1.5;
    }
    .table-card, .admin-card { margin-top: 16px; }
    .table-card { padding: 20px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
    th { color: #64748b; }
    .admin-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .admin-card { padding: 18px; }
    .admin-card p { margin-top: 8px; color: #64748b; font-size: 14px; }
    .admin-actions { display: flex; gap: 8px; margin-top: 12px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .field label { font-size: 14px; font-weight: 700; }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      font-size: 14px;
      font-family: inherit;
      background: white;
    }
    textarea { min-height: 96px; resize: vertical; }
    .toggle-buttons, .pickup-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .pickup-buttons { display: grid; grid-template-columns: repeat(4, 1fr); }
    .preview-image {
      margin-top: 10px;
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }
    .modal.open { display: flex; }
    .modal-content {
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      overflow-y: auto;
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.2);
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .hidden { display: none !important; }
    .ghost-icon {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #cbd5e1;
      background: white;
      cursor: pointer;
    }
    @media (max-width: 1100px) {
      .product-grid, .admin-grid, .admin-stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px) {
      .product-grid, .admin-grid, .admin-stats, .form-grid, .pickup-buttons { grid-template-columns: 1fr; }
      .header { align-items: flex-start; }
      .controls { width: 100%; }
      .menu { left: 0; right: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card header">
      <div class="brand">
        <div class="brand-image" id="brandImageBox">매장 이미지</div>
        <div>
          <h1>팔도마당 대야점</h1>
          <p class="sub">고객님들의 식탁을 책임지는 '팔도마당 대야점' 입니다.</p>
        </div>
      </div>
      <div class="controls">
        <button class="button" id="menuToggle">메뉴 ▼</button>
        <div class="menu" id="menuPanel"></div>
        <button class="button hidden" id="addProductBtn">신규 상품 추가</button>
        <button class="button hidden" id="logoutAdminBtn">관리자 종료</button>
      </div>
    </div>

    <div class="admin-stats hidden" id="adminStats"></div>

    <div class="hero card">
      <h2>오늘의 신선한 장보기</h2>
      <p>과일, 야채, 정육, 공동구매 상품까지 한눈에 확인하고 간편하게 예약하세요.</p>
      <div class="hero-buttons" id="heroButtons"></div>
    </div>

    <div id="content"></div>
  </div>

  <div class="modal" id="adminLoginModal">
    <div class="modal-content">
      <h3>관리자 모드</h3>
      <div class="field">
        <label>관리자번호를 입력해주세요</label>
        <input type="password" id="adminPasswordInput" placeholder="관리자번호 입력" />
      </div>
      <p class="sub">누구도 알면 안되니 관리자번호를 입력해주세요.</p>
      <p id="adminError" style="color:#dc2626; font-size:14px; margin-top:8px;"></p>
      <div class="modal-actions">
        <button class="button" onclick="closeModal('adminLoginModal')">취소</button>
        <button class="button primary" id="confirmAdminLoginBtn">확인</button>
      </div>
    </div>
  </div>

  <div class="modal" id="addProductModal">
    <div class="modal-content">
      <h3>신규 상품 추가</h3>
      <div class="field">
        <label>카테고리</label>
        <select id="newCategory"></select>
      </div>
      <div class="field">
        <label>상품명</label>
        <input id="newName" placeholder="상품명 입력" />
      </div>
      <div class="form-grid">
        <div class="field">
          <label>가격</label>
          <input type="number" id="newPrice" placeholder="가격 입력" />
        </div>
        <div class="field">
          <label>재고</label>
          <input type="number" id="newStock" placeholder="재고 입력" value="1" />
        </div>
      </div>
      <div class="field">
        <label>픽업일</label>
        <input type="date" id="newPickupDate" />
      </div>
      <div class="field">
        <label>상품 이미지</label>
        <button class="button" id="newImageButton">이미지 업로드</button>
        <input type="file" id="newImageInput" accept="image/*" class="hidden" />
        <img id="newImagePreview" class="preview-image hidden" alt="미리보기" />
      </div>
      <div class="field">
        <label>메인화면 노출</label>
        <div class="toggle-buttons">
          <button class="button primary" id="newFeaturedYes">노출</button>
          <button class="button" id="newFeaturedNo">미노출</button>
        </div>
      </div>
      <div class="field">
        <label>설명</label>
        <textarea id="newDescription" placeholder="상품 설명 입력"></textarea>
      </div>
      <div class="modal-actions">
        <button class="button" onclick="closeModal('addProductModal')">취소</button>
        <button class="button primary" id="saveNewProductBtn">추가</button>
      </div>
    </div>
  </div>

  <div class="modal" id="editProductModal">
    <div class="modal-content">
      <h3>상품 수정</h3>
      <div class="field">
        <label>카테고리</label>
        <select id="editCategory"></select>
      </div>
      <div class="field">
        <label>상품명</label>
        <input id="editName" />
      </div>
      <div class="form-grid">
        <div class="field">
          <label>가격</label>
          <input type="number" id="editPrice" />
        </div>
        <div class="field">
          <label>재고</label>
          <input type="number" id="editStock" />
        </div>
      </div>
      <div class="field">
        <label>픽업일</label>
        <input type="date" id="editPickupDate" />
      </div>
      <div class="field">
        <label>상품 이미지</label>
        <button class="button" id="editImageButton">이미지 업로드</button>
        <input type="file" id="editImageInput" accept="image/*" class="hidden" />
        <img id="editImagePreview" class="preview-image hidden" alt="미리보기" />
      </div>
      <div class="field">
        <label>메인화면 노출</label>
        <div class="toggle-buttons">
          <button class="button" id="editFeaturedYes">노출</button>
          <button class="button" id="editFeaturedNo">미노출</button>
        </div>
      </div>
      <div class="field">
        <label>설명</label>
        <textarea id="editDescription"></textarea>
      </div>
      <div class="modal-actions">
        <button class="button" onclick="closeModal('editProductModal')">취소</button>
        <button class="button primary" id="saveEditedProductBtn">저장</button>
      </div>
    </div>
  </div>

  <div class="modal" id="reservationModal">
    <div class="modal-content">
      <h3>예약하기</h3>
      <div class="card" style="padding:16px; background:#f8fafc; border-radius:16px; margin-top:16px;">
        <div id="reservationProductName" style="font-weight:700;"></div>
        <div id="reservationProductPrice" class="sub"></div>
        <div id="reservationRemaining" class="sub" style="margin-top:8px;"></div>
        <div id="reservationPickupDate" style="margin-top:8px; font-size:14px; font-weight:700; color:#334155;"></div>
      </div>
      <div class="field">
        <label>예약번호 4자리 또는 닉네임</label>
        <input id="reservationNickname" placeholder="예: 1234 또는 행복사과" />
      </div>
      <div class="field">
        <label>수량</label>
        <input type="number" id="reservationQuantity" value="1" min="1" />
      </div>
      <div class="field">
        <label>픽업 시간</label>
        <div class="pickup-buttons" id="pickupButtons"></div>
      </div>
      <div class="field">
        <label>요청사항 및 보관 문의</label>
        <textarea id="reservationNote" placeholder="예: 18시 이후 방문 / 하루 보관 요청"></textarea>
      </div>
      <div class="modal-actions">
        <button class="button" onclick="closeModal('reservationModal')">취소</button>
        <button class="button primary" id="confirmReservationBtn">예약 완료</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const SUPABASE_URL = "https://oypfmqyfwgaasqugenlh.supabase.co";
const SUPABASE_KEY = "sb_publishable_kMPKpoUOhTvuE5KXvvWEiA_3HfVK-Au";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
function mapProductFromDb(row) {
  return {
    id: row.id,
    category: row.category,
    name: row.name,
    price: row.price,
    stock: row.stock,
    image: row.image || "",
    description: row.description || "",
    pickupDate: row.pickup_date || "",
    createdOrder: row.created_order || 0,
    isFeatured: row.is_featured ?? true,
  };
}

function mapOrderFromDb(row) {
  return {
    id: row.id,
    productId: row.product_id,
    productName: row.product_name,
    pickupDate: row.pickup_date || "",
    customerName: row.customer_name,
    quantity: row.quantity,
    pickup: row.pickup,
    note: row.note || "",
    createdAt: row.created_at
      ? new Date(row.created_at).toLocaleString("ko-KR")
      : "",
  };
}

async function loadProductsFromSupabase() {
  const { data, error } = await sb
    .from("products")
    .select("*")
    .order("created_order", { ascending: false });

  if (error) {
    console.error("상품 불러오기 실패:", error);
    state.products = [];
    render();
    return;
  }

  state.products = (data || []).map(mapProductFromDb);
  render();
}

async function loadOrdersFromSupabase() {
  const { data, error } = await sb
    .from("orders")
    .select("*")
.order("id", { ascending: false })

  if (error) {
    console.error("예약 불러오기 실패:", error);
    return;
  }

  state.orders = (data || []).map(mapOrderFromDb);
  render();
}
    const MENU_ITEMS = ["공동구매 상품", "과일", "야채", "정육"];
    const PICKUP_OPTIONS = [
      "10:00", "10:30", "11:00", "11:30", "12:00",
      "12:30", "13:00", "13:30", "14:00", "14:30",
      "15:00", "15:30", "16:00", "16:30", "17:00",
      "17:30", "18:00", "18:30", "19:00", "19:30"
    ];
    const STORAGE_KEY = "paldomadang-html-app-v1";

const initialProducts = [];

    const state = {
products: initialProducts,
orders: [],
      currentAdminPassword: JSON.parse(localStorage.getItem(STORAGE_KEY) || "null")?.currentAdminPassword || "0000",
      storeImage: JSON.parse(localStorage.getItem(STORAGE_KEY) || "null")?.storeImage || "",
      activeMenu: "메인화면",
      showAdmin: false,
      adminTab: "products",
      newProductImage: "",
      editProductImage: "",
      selectedReservationPickup: PICKUP_OPTIONS[0],
      selectedProductId: null,
      editingProductId: null,
      newFeatured: true,
      editFeatured: true,
    };

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    currentAdminPassword: state.currentAdminPassword,
    storeImage: state.storeImage,
  }));
}

    function currency(value) {
      return Number(value).toLocaleString("ko-KR") + "원";
    }

    function productsWithMeta() {
      return state.products.map(product => {
        const sold = state.orders
          .filter(order => order.productId === product.id)
          .reduce((sum, order) => sum + Number(order.quantity), 0);
        const remaining = Math.max(Number(product.stock) - sold, 0);
        return { ...product, sold, remaining, isSoldOut: remaining <= 0 };
      });
    }

    function currentProducts() {
      const all = productsWithMeta();
      return all
        .filter(product => state.activeMenu === "메인화면" ? true : product.category === state.activeMenu)
        .sort((a, b) => b.createdOrder - a.createdOrder);
    }

    function renderBrandImage() {
      const box = document.getElementById("brandImageBox");
      if (state.storeImage) {
        box.innerHTML = `<img src="${state.storeImage}" alt="매장 이미지" />`;
      } else {
        box.textContent = "매장 이미지";
      }
    }

    function renderMenu() {
      const menu = document.getElementById("menuPanel");
      menu.innerHTML = "";
      ["메인화면", ...MENU_ITEMS, "관리자"].forEach(item => {
        const btn = document.createElement("button");
        btn.textContent = item;
        const isActive = item === "관리자" ? state.showAdmin : (!state.showAdmin && state.activeMenu === item);
        if (isActive) btn.classList.add("active");
        btn.onclick = () => {
          menu.classList.remove("open");
          if (item === "관리자") {
            openModal("adminLoginModal");
          } else {
            state.showAdmin = false;
            state.activeMenu = item;
            render();
          }
        };
        menu.appendChild(btn);
      });
    }

    function renderHeroButtons() {
      const box = document.getElementById("heroButtons");
      box.innerHTML = "";
      const allBtn = document.createElement("button");
      allBtn.className = "button";
      allBtn.textContent = "전체 상품 보기";
      allBtn.onclick = () => { state.activeMenu = "메인화면"; state.showAdmin = false; render(); };
      box.appendChild(allBtn);
      MENU_ITEMS.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "button";
        btn.textContent = item + " 바로가기";
        btn.onclick = () => { state.activeMenu = item; state.showAdmin = false; render(); };
        box.appendChild(btn);
      });
    }

    function renderAdminStats() {
      const el = document.getElementById("adminStats");
      if (!state.showAdmin) {
        el.classList.add("hidden");
        el.innerHTML = "";
        return;
      }
      el.classList.remove("hidden");
      const totalOrders = state.orders.length;
      const totalQuantity = state.orders.reduce((sum, order) => sum + Number(order.quantity), 0);
      el.innerHTML = `
        <div class="card stat"><div class="stat-title">등록 상품</div><div class="stat-value">${state.products.length}</div></div>
        <div class="card stat"><div class="stat-title">예약 건수</div><div class="stat-value">${totalOrders}</div></div>
        <div class="card stat"><div class="stat-title">총 예약 수량</div><div class="stat-value">${totalQuantity}</div></div>
      `;
    }

    function renderCustomerView() {
      const products = currentProducts();
      let html = `
        <div class="section-title">${state.activeMenu}</div>
        <p class="section-sub">선택한 메뉴에 맞는 상품만 표시됩니다. 메인화면에서는 전체 상품이 보여집니다.</p>
      `;
      if (products.length === 0) {
        html += `<div class="card" style="padding:40px; margin-top:16px; text-align:center; color:#64748b;">이 메뉴에 등록된 상품이 아직 없습니다.</div>`;
        return html;
      }
      html += `<div class="product-grid">`;

async function loadStoreImage() {
  const { data, error } = await sb
    .from("settings")
    .select("*")
    .eq("key", "storeImage")
    .maybeSingle();

  if (error) {
    console.error("매장 이미지 불러오기 실패:", error);

    state.storeImage = data.value;

async function uploadStoreImageToSupabase(file) {
  const fileExt = file.name.split(".").pop();
  const fileName = `store-${Date.now()}.${fileExt}`;

  const { error } = await sb.storage
    .from("store-images")
    .upload(fileName, file, { upsert: true });

  if (error) {
    console.error("매장 이미지 업로드 실패:", error);
    alert("업로드 실패");
    return "";
  }

  const { data } = sb.storage
    .from("store-images")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

    window.openReservation = (id) => {
      const product = productsWithMeta().find(p => p.id === id);
      if (!product || product.isSoldOut) return;
      state.selectedProductId = id;
      state.selectedReservationPickup = PICKUP_OPTIONS[0];
      document.getElementById("reservationProductName").textContent = product.name;
      document.getElementById("reservationProductPrice").textContent = currency(product.price);
      document.getElementById("reservationRemaining").textContent = `남은 수량 ${product.remaining}개`;
      document.getElementById("reservationPickupDate").textContent = product.pickupDate ? `픽업일: ${product.pickupDate}` : "";
      document.getElementById("reservationNickname").value = "";
      document.getElementById("reservationQuantity").value = 1;
      document.getElementById("reservationNote").value = "";
      const box = document.getElementById("pickupButtons");
      box.innerHTML = "";
      PICKUP_OPTIONS.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "button" + (option === state.selectedReservationPickup ? " primary" : "");
        btn.textContent = option;
        btn.onclick = () => {
          state.selectedReservationPickup = option;
          Array.from(box.children).forEach(c => c.classList.remove("primary"));
          btn.classList.add("primary");
        };
        box.appendChild(btn);
      });
      openModal("reservationModal");
    };

document.getElementById("confirmReservationBtn").onclick = async () => {
  const nickname = document.getElementById("reservationNickname").value.trim();
  const quantity = Number(document.getElementById("reservationQuantity").value || 1);
  const note = document.getElementById("reservationNote").value.trim();
  const product = productsWithMeta().find(p => p.id === state.selectedProductId);

  if (!product) return;
  if (!nickname) return alert("예약번호 4자리 또는 닉네임을 입력해주세요.");
  if (quantity < 1) return alert("수량은 1개 이상이어야 합니다.");
  if (quantity > product.remaining) return alert(`남은 수량은 ${product.remaining}개입니다.`);

  const { error } = await sb.from("orders").insert({
    product_id: product.id,
    product_name: product.name,
    pickup_date: product.pickupDate,
    customer_name: nickname,
    quantity: quantity,
    pickup: state.selectedReservationPickup,
    note: note,
  });

  if (error) {
    console.error("예약 저장 실패:", error);
    alert("예약 저장에 실패했습니다.");
    return;
  }

  await loadOrdersFromSupabase();

  closeModal("reservationModal");
  render();
  alert("예약이 완료되었습니다.");
};
